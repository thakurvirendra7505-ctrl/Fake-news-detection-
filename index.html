<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fake News Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-header">
        <h1 class="main-title">AI Fake News Detection</h1>
    </header>

    <main class="container">
        <div class="card">
            <h2 class="subtitle">AI News Detection</h2>
            <p class="description">Paste or type the article content below to verify its authenticity using our AI engine.</p>

            <div class="input-section">
                <textarea id="newsInput" placeholder="Enter news content here..."></textarea>
            </div>

            <div class="button-group">
                <button id="uploadBtn" class="btn btn-secondary">
                    <i class="fas fa-file-upload"></i> Upload News
                </button>
                <button id="checkBtn" class="btn btn-primary">
                    <i class="fas fa-shield-halved"></i> Check News
                </button>
                <button id="resetBtn" class="btn btn-danger">
                    <i class="fas fa-rotate-right"></i> Reset
                </button>
            </div>

            <div id="resultSection" class="result-section hidden">
                <div id="loader" class="loader hidden"></div>
                <div id="resultMessage" class="result-message hidden"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>Powered by AI <i class="fas fa-bolt"></i></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
